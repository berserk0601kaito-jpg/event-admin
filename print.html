<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>QRコード印刷</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      gap: 20px;
    }

    .print-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .print-btn:hover { background: #5a6fd6; }

    .card {
      background: white;
      width: 400px;
      border-radius: 16px;
      padding: 36px 32px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .card h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .card .sub {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 24px;
    }

    .qr-wrap {
      background: #f8f9ff;
      border-radius: 12px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 24px;
    }
    .qr-wrap img {
      width: 220px;
      height: 220px;
      display: block;
    }

    .steps {
      text-align: left;
      background: #f8f9ff;
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 13px;
      color: #444;
      line-height: 2;
    }
    .steps .step-title {
      font-weight: 700;
      color: #667eea;
      margin-bottom: 4px;
    }

    @media print {
      body { background: white; padding: 0; }
      .print-btn { display: none; }
      .card { box-shadow: none; border-radius: 0; width: 100%; }
    }
  </style>
</head>
<body>

  <button class="print-btn" onclick="window.print()">🖨 印刷する</button>

  <div class="card">
    <h1>🎫 交換券を受け取る</h1>
    <p class="sub">下のQRコードをスキャンしてください</p>

    <div class="qr-wrap">
      <img src="/api/qr" alt="QRコード">
    </div>

    <div class="steps">
      <div class="step-title">📱 スマホでの受け取り方</div>
      <div>① カメラでQRコードを読み取る</div>
      <div>② 名前・校舎・担任を入力する</div>
      <div>③ 交換券が発行されます</div>
      <div style="margin-top:10px; font-size:12px; color:#aaa;">
        ※ 登録後はホーム画面に追加すると次回からすぐ開けます
      </div>
    </div>
  </div>

</body>
</html>
