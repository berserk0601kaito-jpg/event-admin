<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交換券</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 380px; }

    /* ---- Ticket card ---- */
    .ticket {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      animation: slideUp 0.4s ease;
      overflow: hidden;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ticket-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 32px 36px;
      color: white;
      text-align: center;
      position: relative;
    }
    /* 下の丸いカーブ */
    .ticket-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 24px;
      background: white;
      border-radius: 50% 50% 0 0 / 24px 24px 0 0;
    }
    .ticket-label {
      font-size: 11px;
      letter-spacing: 3px;
      opacity: 0.75;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .ticket-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .ticket-subtitle {
      font-size: 11px;
      opacity: 0.65;
    }

    .ticket-body {
      padding: 12px 32px 24px;
      position: relative;
    }

    .name-section { text-align: center; margin-bottom: 20px; }
    .name-label {
      font-size: 11px;
      color: #bbb;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .name-furigana {
      font-size: 15px;
      color: #999;
      margin-bottom: 4px;
      font-weight: 400;
    }
    .name-kanji {
      font-size: 30px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 2px;
    }

    .divider {
      border: none;
      border-top: 2px dashed #e8e8e8;
      margin: 0 0 20px;
    }

    .ticket-info {
      display: flex;
      justify-content: space-between;
      text-align: center;
    }
    .info-item { flex: 1; }
    .info-label { font-size: 10px; color: #bbb; margin-bottom: 5px; letter-spacing: 0.5px; }
    .info-value { font-size: 13px; font-weight: 600; color: #444; }
    .info-value.status-ok   { color: #27ae60; }
    .info-value.status-used { color: #e74c3c; }

    /* 使用済みスタンプ */
    .used-stamp {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-18deg);
      border: 4px solid rgba(231, 76, 60, 0.65);
      border-radius: 8px;
      padding: 6px 16px;
      color: rgba(231, 76, 60, 0.65);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      white-space: nowrap;
      pointer-events: none;
      display: none;
    }
    .ticket.used .used-stamp   { display: block; }
    .ticket.used .ticket-body  { opacity: 0.45; }

    /* ---- Footer ---- */
    .ticket-footer { padding: 0 24px 28px; }

    .use-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .use-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(46, 204, 113, 0.5);
    }
    .use-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      box-shadow: none;
    }
    .used-time {
      text-align: center;
      font-size: 12px;
      color: #e74c3c;
      margin-top: 10px;
    }

    /* ---- Loading / Error ---- */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: white;
      font-size: 15px;
    }
    .error-card {
      background: white;
      border-radius: 20px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .error-card .icon { font-size: 48px; margin-bottom: 16px; }
    .error-card h2 { font-size: 17px; color: #1a1a2e; margin-bottom: 8px; }
    .error-card p  { font-size: 13px; color: #999; line-height: 1.7; }

    /* ---- Modal ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: popIn 0.2s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal .icon { font-size: 40px; margin-bottom: 14px; }
    .modal h2 { font-size: 17px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
    .modal p  { font-size: 13px; color: #777; margin-bottom: 26px; line-height: 1.8; }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-btn {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .modal-btn:hover { opacity: 0.85; }
    .modal-cancel  { background: #f0f0f0; color: #666; }
    .modal-confirm { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
  </style>
</head>
<body>
  <div class="container">
    <div id="content"><div class="loading">読み込み中...</div></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="icon">⚠️</div>
      <h2>チケットを使用しますか？</h2>
      <p>一度使用すると、このチケットは<br>再び使えなくなります。</p>
      <div class="modal-buttons">
        <button class="modal-btn modal-cancel"  id="modalCancel">キャンセル</button>
        <button class="modal-btn modal-confirm" id="modalConfirm">使用する</button>
      </div>
    </div>
  </div>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const ticketId = params.get('id');

    if (!ticketId) {
      showError('URLが正しくありません');
    } else {
      loadTicket();
    }

    async function loadTicket() {
      try {
        const res = await fetch(`/api/ticket/${ticketId}`);
        if (res.status === 404) {
          localStorage.removeItem('student_ticket_id');
          window.location.replace('/');
          return;
        }
        if (!res.ok) throw new Error();
        renderTicket(await res.json());
      } catch {
        showError('このチケットは存在しないか、<br>URLが正しくありません');
      }
    }

    function showError(msg) {
      document.getElementById('content').innerHTML = `
        <div class="error-card">
          <div class="icon">❌</div>
          <h2>チケットが見つかりません</h2>
          <p>${msg}</p>
        </div>`;
    }

    function fmtDate(iso) {
      if (!iso) return '−';
      const d = new Date(iso);
      return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
    }

    function fmtDateTime(iso) {
      if (!iso) return '−';
      return new Date(iso).toLocaleString('ja-JP');
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderTicket(t) {
      const no = t.id.split('-')[0].toUpperCase();
      document.getElementById('content').innerHTML = `
        <div class="ticket ${t.used ? 'used' : ''}" id="ticketCard">
          <div class="ticket-header">
            <div class="ticket-label">STUDENT DISCOUNT TICKET</div>
            <div class="ticket-title">交換券</div>
            <div class="ticket-subtitle">本人確認の上ご利用ください</div>
          </div>

          <div class="ticket-body">
            <div class="name-section">
              <div class="name-label">氏　名</div>
              <div class="name-furigana">${esc(t.furigana)}</div>
              <div class="name-kanji">${esc(t.kanji)}</div>
              ${t.school ? `<div style="font-size:12px;color:#aaa;margin-top:6px">🏫 ${esc(t.school)}</div>` : ''}
            </div>

            <hr class="divider">

            <div class="ticket-info">
              <div class="info-item">
                <div class="info-label">発行日</div>
                <div class="info-value">${fmtDate(t.createdAt)}</div>
              </div>
              <div class="info-item">
                <div class="info-label">チケットNo.</div>
                <div class="info-value">${no}</div>
              </div>
              <div class="info-item">
                <div class="info-label">状態</div>
                <div class="info-value ${t.used ? 'status-used' : 'status-ok'}">${t.used ? '使用済み' : '未使用'}</div>
              </div>
            </div>

            <div class="used-stamp">使用済み</div>
          </div>

          <div class="ticket-footer">
            <button class="use-btn" id="useBtn" ${t.used ? 'disabled' : ''}>
              ${t.used ? '使用済み' : '✓　使用する'}
            </button>
            ${t.used && t.usedAt
              ? `<div class="used-time">使用日時：${fmtDateTime(t.usedAt)}</div>`
              : ''}
          </div>
        </div>`;

      if (!t.used) {
        document.getElementById('useBtn').addEventListener('click', () => {
          document.getElementById('modalOverlay').classList.add('show');
        });
      }

      document.getElementById('modalCancel').addEventListener('click', () => {
        document.getElementById('modalOverlay').classList.remove('show');
      });

      document.getElementById('modalConfirm').addEventListener('click', async () => {
        document.getElementById('modalOverlay').classList.remove('show');
        await useTicket();
      });
    }

    async function useTicket() {
      const btn = document.getElementById('useBtn');
      btn.disabled = true;
      btn.textContent = '処理中...';

      try {
        const res  = await fetch(`/api/use/${ticketId}`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'エラーが発生しました');
        loadTicket();
      } catch (err) {
        alert(err.message);
        loadTicket();
      }
    }
  </script>
</body>
</html>
